{% extends "layout.html" %}
{% block title %}Edit Product - Seller{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-edit me-2 text-warning"></i>Edit Product</h5>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% if product[7] %}
                        <div class="text-center mb-3">
                            <img src="{{ product[7] }}" style="height: 150px; border-radius: 8px;">
                        </div>
                        {% endif %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Change Image</label>
                            <input type="file" name="product_image" class="form-control" accept="image/*">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Product Name</label>
                            <input type="text" name="product_name" class="form-control" value="{{ product[2] }}" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Price (USD)</label>
                                <input type="number" step="0.01" name="price" class="form-control" value="{{ product[3] }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Category</label>
                                <select name="category" class="form-select">
                                    <option {% if product[9]=='Electronics' %}selected{% endif %}>Electronics</option>
                                    <option {% if product[9]=='Clothing' %}selected{% endif %}>Clothing</option>
                                    <option {% if product[9]=='Furniture' %}selected{% endif %}>Furniture</option>
                                    <option {% if product[9]=='Vehicles' %}selected{% endif %}>Vehicles</option>
                                    <option {% if product[9]=='Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description" rows="5" class="form-control" required>{{ product[4] }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Location</label>
                                <input type="text" name="location" class="form-control" value="{{ product[5] }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">WhatsApp</label>
                                <input type="tel" name="whatsapp" class="form-control" value="{{ product[6] }}" required>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/seller/products" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-warning">Update Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
