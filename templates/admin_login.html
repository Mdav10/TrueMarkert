{% extends "layout.html" %}
{% block title %}Admin Login - My Market{% endblock %}
{% block content %}
<div class="container mt-5" style="min-height: 60vh;">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-danger text-white text-center border-0">
                    <h4 class="mb-0"><i class="fas fa-user-shield me-2"></i>Admin Portal</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Admin Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control" value="admin@mymarket.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Admin Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Enter admin password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 py-2">Login as Admin</button>
                    </form>
                    <hr class="my-4">
                    <div class="text-center">
                        <a href="/login" class="text-muted small"><i class="fas fa-arrow-left"></i> Back to User Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
