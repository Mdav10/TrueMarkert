{% extends "layout.html" %}
{% block title %}Edit Profile - Buyer{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-user-edit me-2 text-info"></i>Edit Buyer Profile</h5>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="text-center mb-3">
                            {% if buyer[5] %}
                                <img src="{{ buyer[5] }}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
                            {% else %}
                                <i class="fas fa-user-circle fa-4x text-muted"></i>
                            {% endif %}
                            <div class="mt-2">
                                <input type="file" name="profile_pic" class="form-control" accept="image/*">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" name="full_name" class="form-control" value="{{ buyer[1] }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control bg-light" value="{{ buyer[2] }}" disabled>
                            <small class="text-muted">Email cannot be changed</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" value="{{ buyer[3] or '' }}">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-gradient">Save Changes</button>
                            <a href="/buyer/dashboard" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
